name: Deploy Node App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}

          script: |
            rm -rf app

            git clone https://github.com/sowmya-rebbavarapu/node-app-deploy.git

            cd app

            sudo docker build -t idp-app .

            sudo docker stop idp-container || true
            sudo docker rm idp-container || true

            sudo docker run -d -p 3000:3000 --name idp-container idp-app